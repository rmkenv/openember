    #   desc: "Description of dataset"

# ─── NOAA Endpoint Overrides ─────────────────────────────────────────────────
# Override state-level NOAA query parameters.
# Leave blank to use the state from jurisdiction.state above.
noaa:
  alert_state: "NY"                    # State code for NWS alert queries
  usgs_state: "NY"                     # State code for USGS gauge queries
  fema_state: "NY"                     # State code for FEMA disaster queries

# ─── Branding ────────────────────────────────────────────────────────────────
branding:
  app_title: "EMBER"                   # App title shown in header
  app_subtitle: "Emergency Management Body of Evidence & Resources"
  jurisdiction_line: "NYC JURISDICTION" # Shown in header subtitle
  primary_color: "#e8372c"             # Accent color (hex)
  logo_emoji: "🚨"                     # Browser tab icon
