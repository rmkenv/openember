# ─────────────────────────────────────────────────────────────────────────────
# EMBER — Jurisdiction Configuration Template
# ─────────────────────────────────────────────────────────────────────────────
# Fill in the fields below for your municipality.
# Run the Setup Wizard in the app to generate this file automatically, or
# edit it directly. All fields marked (required) must be present.
# ─────────────────────────────────────────────────────────────────────────────

jurisdiction:
  name: "City of Example"              # (required) Display name
  short_name: "Example"                # Short name for headers
  state: "NY"                          # (required) Two-letter state code
  state_full: "New York"               # Full state name
  county: "Example County"             # Primary county name
  center_lat: 40.7128                  # (required) Map center latitude
  center_lng: -74.0060                 # (required) Map center longitude
  bbox_north: 41.0                     # Bounding box for station discovery
  bbox_south: 40.4
  bbox_east: -73.7
  bbox_west: -74.3
  timezone: "America/New_York"         # IANA timezone
  zoom_default: 11                     # Default map zoom level (8–15)

# ─── National Weather Service ─────────────────────────────────────────────────
nws:
  office: "OKX"                        # (required) NWS forecast office ID
                                       # Find at: https://www.weather.gov/srh/nwsoffices
  grid_x: 33                           # (required) NWS grid X for your location
  grid_y: 37                           # (required) NWS grid Y for your location
                                       # Find at: https://api.weather.gov/points/{lat},{lng}
  alert_zone: "NYZ178"                 # NWS public forecast zone ID
                                       # Find at: https://api.weather.gov/zones?type=public&area={state}
  obs_stations:                        # ASOS/AWOS observation stations (ICAO codes)
    - id: "KNYC"
      name: "Central Park"
      lat: 40.7789
      lng: -73.9692
    - id: "KJFK"
      name: "JFK Airport"
      lat: 40.6413
      lng: -73.7781
    # Add more stations as needed

# ─── NOAA CO-OPS Tidal Gauges ─────────────────────────────────────────────────
# Find station IDs at: https://tidesandcurrents.noaa.gov/map/
# Or auto-discover via the Setup Wizard
coops_stations:
  - id: "8518750"
    name: "The Battery"
    lat: 40.7003
    lng: -74.0141
    is_primary: true                   # Primary surge gauge for your jurisdiction
    flood_thresholds:
      action: 4.5                      # Action stage (ft MLLW)
      minor: 5.5                       # Minor flood stage
      moderate: 6.5                    # Moderate flood stage
      major: 8.5                       # Major flood stage
  # - id: "8516945"
  #   name: "Kings Point"
  #   lat: 40.8105
  #   lng: -73.7659
  #   flood_thresholds:
  #     action: 4.5
  #     minor: 5.5
  #     moderate: 6.5
  #     major: 8.5

# ─── Knowledge Base ───────────────────────────────────────────────────────────
# These text blocks are injected into the LLM system prompt.
# Write in plain text — no markdown formatting needed.
# Keep each section under 800 words for best LLM performance.
knowledge_base:
  flood_zones: |
    Describe your jurisdiction's FEMA flood zones here.
    Include zone designations (A, AE, VE, X), key affected areas,
    and any post-disaster map revisions.
    Example: Zone A covers the downtown riverfront and the north industrial corridor.

  evac_zones: |
    Describe evacuation zone structure for your jurisdiction.
    Include zone names/numbers, what conditions trigger each zone,
    shelter locations, and key evacuation routes.
    Example: Zone 1 covers all areas within 0.5 miles of the waterfront.

  critical_infrastructure: |
    List key infrastructure: hospitals (with trauma level), power substations,
    water/wastewater plants, transit hubs, communications infrastructure.
    Note any facilities in flood zones or otherwise vulnerable.

  hazard_profiles: |
    Describe the primary hazards for your jurisdiction.
    Common hazards: hurricanes/tropical storms, flooding, tornado, winter storm,
    extreme heat, wildfire, earthquake, hazmat, terrorism.
    Include historical events and typical impact.

  resources: |
    List emergency contacts and resources:
    - Emergency Management office name, phone, address
    - Fire department
    - Police department
    - Public health
    - State emergency management agency
    - FEMA region
    - Local utilities (electric, gas, water)
    - Emergency alert system (how residents sign up)

# ─── Static Map Points ────────────────────────────────────────────────────────
# These appear as permanent markers on the operational map.
# Remove sections you don't need; add custom categories below.
map_points:
  hospitals:
    color: "#f87171"
    icon: "🏥"
    label: "Hospitals"
    features:
      - name: "Example General Hospital"
        lat: 40.7200
        lng: -74.0050
        note: "Level 1 Trauma | 500 beds"
        borough: ""           # Optional neighborhood/district
      # Add more hospitals

  shelters:
    color: "#60a5fa"
    icon: "🏫"
    label: "Evacuation Shelters"
    features:
      - name: "Example High School"
        lat: 40.7300
        lng: -73.9900
        note: "Hurricane Evacuation Center — Zone 1"
      # Add more shelters

  gauges:
    color: "#4ade80"
    icon: "📡"
    label: "Stream Gauges"
    features:
      - name: "Example River at Downtown"
        lat: 40.7100
        lng: -74.0200
        note: "USGS gauge — flood monitoring"
      # Add more gauges

  eoc:
    color: "#facc15"
    icon: "🏛"
    label: "EOC / Command Posts"
    features:
      - name: "Emergency Operations Center"
        lat: 40.7150
        lng: -74.0100
        note: "Primary EOC"
      # Add more EOC locations

  flood_risk:
    color: "#fb923c"
    icon: "💧"
    label: "High Flood Risk Areas"
    features:
      - name: "Example Low-Lying Area"
        lat: 40.7050
        lng: -74.0300
        note: "FEMA Zone AE — frequently flooded"
      # Add more flood risk areas

  # custom_category:             # Add your own categories
  #   color: "#a78bfa"
