# ─── NYC Open Data / Socrata ──────────────────────────────────────────────────
socrata:
  domain: "data.cityofnewyork.us"      # Your Socrata domain
                                       # e.g. data.baltimorecity.gov
                                       #      data.cityofchicago.org
                                       #      data.sfgov.org
  preset_datasets:
    - id: "fhrw-4uyv"
      name: "311 Service Requests"
      agency: "311"
      lat_col: "latitude"
      lng_col: "longitude"
      label_col: "complaint_type"
      color: "#60a5fa"
      icon: "📞"
      desc: "Real-time 311 complaints"
    # Add more presets for your city's open data portal
    # - id: "xxxx-xxxx"
    #   name: "Dataset Name"
    #   agency: "Agency Name"
    #   lat_col: "latitude"
    #   lng_col: "longitude"
