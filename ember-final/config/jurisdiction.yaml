knowledge_base:
  flood_zones: |
    Zone A: High-risk coastal/tidal flood areas — Lower Manhattan, Red Hook (Brooklyn), Rockaway Peninsula (Queens), Staten Island east shore.
    Zone AE: Special Flood Hazard Areas — Coney Island, Howard Beach, Broad Channel, southern Staten Island.
    Zone VE: Coastal high-hazard with wave action — Far Rockaway, Breezy Point, Sea Gate.
    Zone X (shaded): Moderate flood risk, 0.2% annual chance.
    Post-Sandy (2012): ~88,000 buildings damaged; $19B in damage.

  evac_zones: |
    Zone 1: Mandatory evacuation Cat 1+ hurricanes. Rockaways, Coney Island, South Beach SI, Red Hook waterfront.
    Zone 2: Evacuation advised Cat 2+. Zones 3-6: progressively lower risk inland.
    Shelters: 30+ hurricane evacuation centers, ~600,000 primary capacity.
    Contraflow: FDR Drive, BQE, Staten Island Expressway.

  critical_infrastructure: |
    Hospitals: 11 Level 1 Trauma Centers — Bellevue (Manhattan), Kings County (Brooklyn), Lincoln (Bronx), Staten Island University, Jamaica (Queens).
    Power: ConEd East River substations critical. Underground feeders in Lower Manhattan flooded during Sandy.
    Subway: 245 miles track, 472 stations. 52 stations in flood zones.
    Water: DEP 14 reservoirs, 2 city tunnels. Newtown Creek & North River WWTPs flooded in Sandy.
    Airports: JFK (Zone A/AE), LaGuardia (Zone A).

  hazard_profiles: |
    HURRICANES: Sandy (2012, Cat 1) — $19B damage. Primary risk: storm surge.
    EXTREME HEAT: 115-150 deaths/year. Protocol at Heat Index >= 100F. 500+ cooling centers.
    FLOODING: Ida 2021 — 13 deaths in basement apartments. 22,000+ miles combined sewer.
    WINTER STORMS: Jonas 2016 — 27 inches, travel ban. 2,300 Sanitation plows.
    EARTHQUAKE: Low risk. Historical 1884 M5.5. Unreinforced masonry stock pre-1930.
    TERRORISM/HAZMAT: Highest-risk US city (DHS). JTTF, NYPD Intelligence, FDNY HazMat.

  resources: |
    NYC OEM: 718-422-8700 | nyc.gov/oem | EOC: 165 Cadman Plaza East, Brooklyn
    FDNY: 911 | 718-999-2000 | NYPD: 911 | 646-610-5000
    NYC Health: 311 | FEMA Region 2: 212-680-3600
    NWS OKX: 631-924-0517 | Con Edison: 1-800-75-CONED
    Notify NYC: nyc.gov/notifynyc

